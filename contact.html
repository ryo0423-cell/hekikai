  <head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header-wrapper">
      <section class="header-container" id="main-header">
        <div class="header-content">
          <a href="index.html"><img class="logo" src="img/logo.png" alt="HEKIKAI ロゴ" /></a>
          <input type="checkbox" id="nav-toggle" class="nav-toggle" />
          <label for="nav-toggle" class="hamburger"><span></span><span></span><span></span></label>
          <nav id="nav">
            <ul>
              <li><a href="service.html">事業案内</a></li>
              <li><a href="company.html">会社概要</a></li>
              <li><a href="pickup.html">ピックアップ</a></li>
              <li><a href="contact.html">お問い合わせ</a></li>
            </ul>
          </nav>
        </div>
      </section>
      <section class="header-container" id="fixed-header">
        <div class="header-content fixed-header-content">
          <a href="index.html"><img class="logo-fixed" src="img/logo.png" alt="HEKIKAI ロゴ" /></a>
          <input type="checkbox" id="nav-toggle-fixed" class="nav-toggle" />
          <label for="nav-toggle-fixed" class="hamburger"><span></span><span></span><span></span></label>
          <nav id="nav-fixed">
            <ul>
              <li><a href="service.html">事業案内</a></li>
              <li><a href="company.html">会社概要</a></li>
              <li><a href="pickup.html">ピックアップ</a></li>
              <li><a href="contact.html">お問い合わせ</a></li>
            </ul>
          </nav>
        </div>
      </section>
      <section class="other-hero-wrapper">
        <img class="other-hero-img" src="img/hekikai-37.jpg" alt="お問い合わせ" />
        <h1 data-en="contact">お問い合わせ</h1>
      </section>
    </header>

    <main>
      <section class="hero-bottom">
        <p><a href="index.html">ホーム</a> / <span class="trans">お問い合わせ</span></p>
      </section>
      <section class="contact-wrapper">
        <form class="contact-form">
          <dl class="contact-dl">
            <div class="contact-row">
              <dt>お問い合わせ種別<span class="badge-required">必須</span></dt>
              <dd>
                <select name="type" class="form-control">
                  <option value="">種別を選択してください</option>
                  <option value="お見積り">お見積り</option>
                  <option value="採用問い合わせ">採用問い合わせ</option>
                </select>
              </dd>
            </div>
            <div class="contact-row">
              <dt>貴社名<span class="badge-required">必須</span></dt>
              <dd><input type="text" name="company_name" class="form-control" placeholder="例: XXXX株式会社" /></dd>
            </div>
            <div class="contact-row">
              <dt>部署名<span class="badge-optional">任意</span></dt>
              <dd><input type="text" name="department" class="form-control" placeholder="例: XXXX部" /></dd>
            </div>
            <div class="contact-row">
              <dt>お名前<span class="badge-required">必須</span></dt>
              <dd><input type="text" name="your_name" class="form-control" placeholder="例: 山田太郎" /></dd>
            </div>
            <div class="contact-row">
              <dt>メールアドレス<span class="badge-required">必須</span></dt>
              <dd><input type="email" name="email" class="form-control" placeholder="例: example@example.com" /></dd>
            </div>
            <div class="contact-row">
              <dt>電話番号<span class="badge-required">必須</span></dt>
              <dd><input type="tel" name="tel" class="form-control" placeholder="例: 03-1234-5678" /></dd>
            </div>
            <div class="contact-row">
              <dt>お問い合わせ内容<span class="badge-required">必須</span></dt>
              <dd><textarea name="message" class="form-control" rows="8" placeholder="お問い合わせ内容を具体的にご入力ください。"></textarea></dd>
            </div>
          </dl>
          <div class="contact-btn-area">
            <button type="submit" class="btn-green contact-submit-btn">送信する</button>
          </div>
        </form>
      </section>
    </main>

    <footer>
      <section class="footer-wrapper">
        <div class="footer-left">
          <a href="index.html"><img src="img/logo.png" alt="HEKIKAI ロゴ" class="footer-logo" /></a>
          <small class="copyright">©hekikai inc.</small>
        </div>
        <div class="footer-right">
          <ul class="footer-list">
            <li><a href="service.html">事業案内</a></li>
            <li><a href="company.html">会社概要</a></li>
            <li><a href="pickup.html">ピックアップ</a></li>
            <li><a href="news.html">お知らせ</a></li>
            <li><a href="contact.html">お問い合わせ</a></li>
          </ul>
        </div>
      </section>
    </footer>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
